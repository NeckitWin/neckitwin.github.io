<div class="background">
  <div class="background-content">
    <div class="profile-content">
      <div class="avatar-content">
        <img class="avatar-img" src="assets/public/img/avatar.gif" alt="">
        <h1>NeckitWin</h1>
        <p class="description-profile">FullStack Developer</p>
      </div>
      <div class="profile-info">
        <ul class="info">
          <li *ngFor="let experience of experiences">
            <span>{{ experience.key }}</span><span>{{ experience.value }}</span>
          </li>
        </ul>
      </div>
    </div>
    <div class="links-content" >
      <div class="links-background" *ngFor="let links of links">
        <a href="{{links.link}}" style="background-color:{{links.color}};" class="link" target="_blank"><img class="link-img" src="{{ links.icon }}" alt="icon">{{links.text}}</a>
      </div>
    </div>
  </div>
</div>
